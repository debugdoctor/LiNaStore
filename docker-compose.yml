services:
  linastore:
    image: aimerick/linastore-server:latest
    container_name: linastore-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - RUST_LOG=info
      # Enable auth with a value in .env.
      # - LINASTORE_AUTH_REQUIRED=1
      # - LINASTORE_ADMIN_PASSWORD=${LINASTORE_ADMIN_PASSWORD}
    volumes:
      - ./linadata:/app/linadata
      # Mount local directory for development (uncomment for development)
      # - ./linadata:/app/data
    ports:
      - "${LINASTORE_HTTP_PORT:-8086}:${LINASTORE_HTTP_PORT:-8086}"
      - "${LINASTORE_ADVANCED_PORT:-8096}:${LINASTORE_ADVANCED_PORT:-8096}"
